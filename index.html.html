<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Havells Galaxy V8.1</title>
<style>
body{font-family:Arial;background:#eef2f7;margin:0}
.header{background:#003366;color:#fff;text-align:center;padding:18px}
.box{max-width:1000px;margin:20px auto;background:#fff;padding:22px;border-radius:15px}
select,input{padding:10px;border-radius:8px;border:1px solid #ccc}
select{width:100%;margin:10px 0}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd}
.rate{color:green;font-weight:bold}
.btn{display:block;text-align:center;background:#25D366;color:#fff;text-decoration:none;padding:15px;border-radius:12px;margin-top:18px;cursor:pointer}
#quotePage{display:none}.card{border:1px solid #ddd;padding:14px;border-radius:12px;margin-top:15px;background:#fafafa}
</style><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
function numberToWords(num){
const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function two(n){if(n<20)return a[n]; return b[Math.floor(n/10)] + (n%10?' '+a[n%10]:'');}
function three(n){let s=''; if(Math.floor(n/100)) s+=a[Math.floor(n/100)]+' Hundred '; if(n%100) s+=two(n%100); return s.trim();}
if(num===0) return 'Zero';
let out='';
if(Math.floor(num/100000)) out+=three(Math.floor(num/100000))+' Lakh ';
num%=100000;
if(Math.floor(num/1000)) out+=three(Math.floor(num/1000))+' Thousand ';
num%=1000;
if(num) out+=three(num);
return out.trim();
}

function savePDF(){
let customer=prompt("Enter Customer Name");
if(!customer) return;

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let total=0;
let y=82;
let sno=1;

const now=new Date();
const quoteNo='SHG-'+now.toISOString().slice(0,10).replace(/-/g,'')+'-001';

doc.setFontSize(18);
doc.text("STAR HAVELLS GALAXY",105,15,{align:'center'});

doc.setFontSize(10);
doc.text("4 Gha 30, Opposite Military Hospital",105,23,{align:'center'});
doc.text("Near KCRI College",105,29,{align:'center'});
doc.text("Manu Marg, Alwar",105,35,{align:'center'});
doc.text("Mob: 8905123404",105,41,{align:'center'});

doc.line(14,46,196,46);

doc.setFontSize(11);
doc.text("Quote No : "+quoteNo,14,55);
doc.text("Date : "+now.toLocaleDateString(),14,62);
doc.text("Time : "+now.toLocaleTimeString(),14,69);
doc.text("Customer : "+customer,14,76);

doc.line(14,80,196,80);

doc.setFontSize(10);
doc.text("S.No",14,y);
doc.text("Division",28,y);
doc.text("Product",70,y);
doc.text("Qty",125,y);
doc.text("Rate",145,y);
doc.text("Amount",170,y);

y+=4;
doc.line(14,y,196,y);
y+=8;

for(let key in cart){
 let qty=Number(cart[key]);
 if(qty>0){
   let [cat,sub,prod]=key.split('|');
   let rate=quoteData[cat][sub][prod];
   let amt=qty*rate;
   total+=amt;

   doc.text(String(sno++),14,y);
   doc.text(sub.substring(0,20),28,y);
   doc.text(prod.substring(0,30),70,y);
   doc.text(String(qty),125,y);
   doc.text(String(rate),145,y);
   doc.text(String(amt),170,y);
   y+=8;
 }
}

doc.line(14,y,196,y);
y+=10;

doc.setFontSize(12);
doc.text("Grand Total : Rs. "+total,14,y);

y+=10;
doc.setFontSize(10);
doc.text("Amount in Words:",14,y);
y+=7;
doc.text("Rupees "+numberToWords(total)+" Only",14,y);

y+=15;
doc.text("This quotation is computer generated and does not require signature.",14,y);
y+=7;
doc.text("This quotation is for reference only. Please confirm final rates and availability",14,y);
y+=5;
doc.text("with Star Havells Galaxy before placing your order.",14,y);

doc.save("Quotation_"+customer+".pdf");
}

</script></head><body>

<!-- V8 INFORMATIVE PART UNCHANGED -->
<div id="mainPage">
<div class="header"><h1>STAR HAVELLS GALAXY</h1><p>Product Rate Reference Portal</p></div>
<div class="box">
<label>Choose Category</label>
<select><option>Wire</option></select>

<label>Choose Sub Category</label>
<select id="sub" onchange="showRates()">
<option>Select</option>
<option>90 Mtr</option><option>180 Mtr</option><option>CAT 6</option><option>Multi-Core</option><option>Aluminium Armoured</option>
</select>

<div id="rates"></div>

<div class="btn" onclick="openQuote()">🚀 Create Your Order / Get Quote</div>
</div>
</div>


<!-- ONLY GET QUOTE CHANGED -->
<div id="quotePage">
<div class="header"><h1>STAR HAVELLS GALAXY</h1><p>Smart Quotation Builder</p></div>
<div class="box">

<label>Choose Main Category</label>
<select id="qcat">
<option value="">Select Category</option>
<option value="Wire">Wire</option>
<option value="Fan">Fan</option>
</select>

<label>Choose Sub Category</label>
<select id="qsub">
<option value="">Select Sub Category</option>
</select>

<div id="sections"></div>

<div id="quote" class="card" style="display:none">
<h2>Quotation Preview</h2>
<div id="qbody"></div>
<h2 id="grand"></h2>
<div class="btn" onclick="savePDF()">📄 Save PDF</div>
</div>

</div>
</div>

<script>
const infoData={
"90 Mtr":{"1.5 sqmm":"₹2450","2.5 sqmm":"₹3950"},
"180 Mtr":{"1.5 sqmm":"₹4850"},
"CAT 6":{"CAT 6 Cable":"₹4850"},
"Multi-Core":{"2 Core 1.5":"₹3250"},
"Aluminium Armoured":{"4 Core 16 sqmm":"₹12950"}
};

const quoteData={
"Wire":{
"90 Mtr":{"1.5 sqmm":2450,"2.5 sqmm":3950},
"180 Mtr":{"1.5 sqmm":4850},
"CAT 6":{"CAT 6 Cable":4850},
"Multi-Core":{"2 Core 1.5":3250},
"Aluminium Armoured":{"4 Core 16 sqmm":12950}
},
"Fan":{"Ceiling Fan":{"1200mm Fan":2250}}
};

const cart={};

function showRates(){
let s=sub.value,i=infoData[s];
if(!i){rates.innerHTML='';return;}
let h='<table><tr><th>Product</th><th>Rate</th></tr>';
for(let p in i){h+=`<tr><td>${p}</td><td class="rate">${i[p]}</td></tr>`;}
h+='</table>';
rates.innerHTML=h;
}

function openQuote(){
mainPage.style.display='none';
quotePage.style.display='block';
}

qcat?.addEventListener?.('change',()=>{});

window.addEventListener('DOMContentLoaded',()=>{
const cat=document.getElementById('qcat');
const subSel=document.getElementById('qsub');

cat.addEventListener('change',function(){
subSel.innerHTML='<option value="">Select Sub Category</option>';
sections.innerHTML='';

if(!this.value) return;

Object.keys(quoteData[this.value]).forEach(s=>{
subSel.innerHTML += `<option value="${s}">${s}</option>`;
});
});

subSel.addEventListener('change',showProducts);
});

function showProducts(){
let cat=qcat.value;
let sub=qsub.value;

sections.innerHTML='';

if(!cat || !sub) return;

let h=`<div class="card"><table>
<tr><th>Product</th><th>Rate</th><th>Qty</th></tr>`;

for(let p in quoteData[cat][sub]){
let key=`${cat}|${sub}|${p}`;
let qty=cart[key] || '';
h+=`<tr>
<td>${p}</td>
<td>₹${quoteData[cat][sub][p]}</td>
<td><input type="number" min="0" step="1" value="${qty}"
oninput="updateQty(this,'${key}')"></td>
</tr>`;
}

h+='</table></div>';
sections.innerHTML=h;
}

function updateQty(el,key){
let v=el.value;
if(v!=='' && Number(v)<0){v=0;el.value=0;}
cart[key]=v;
generate();
}

function generate(){
let total=0;
let any=false;

let h='<table><tr><th>Item</th><th>Rate</th><th>Qty</th><th>Amount</th></tr>';

for(let key in cart){
let qty=Number(cart[key]);
if(qty>0){
let [cat,sub,prod]=key.split('|');
let rate=quoteData[cat][sub][prod];
let amt=rate*qty;

total+=amt;
any=true;

h+=`<tr>
<td>${cat} → ${sub} → ${prod}</td>
<td>₹${rate}</td>
<td>${qty}</td>
<td>₹${amt}</td>
</tr>`;
}
}

h+='</table>';

if(any){
quote.style.display='block';
qbody.innerHTML=h;
grand.innerHTML='Grand Total : ₹'+total;
}else{
quote.style.display='none';
}
}
