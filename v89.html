<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Star Galaxy V89</title>
</head>
<body>

<h2>Star Galaxy V89</h2>

<label>Category</label>
<select id="cat">
<option>Loading...</option>
</select>

<label>Sub Category</label>
<select id="sub">
<option>Select Category First</option>
</select>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRxd_G-sJAfhK7PUWSi_g6_JHdsWqOI4ZZsULpRmRtsFUUSmXiaCswhcPi5zoohvGwN-54gIRxRs_8C/pub?gid=354666361&single=true&output=csv";

let rowsData=[];

async function loadData(){

 const txt = await fetch(CSV_URL).then(r=>r.text());

 rowsData = txt.trim()
 .split("\n")
 .slice(1)
 .map(r=>r.split(","));

 const cats = [...new Set(
 rowsData.map(r=>r[2]?.trim())
 )];

 const cat=document.getElementById("cat");

 cat.innerHTML="";

 cats.forEach(c=>{
   cat.innerHTML +=
   `<option value="${c}">${c}</option>`;
 });

 loadSubCategories();

}

function loadSubCategories(){

 const selectedCat =
 document.getElementById("cat").value;

 const subs = [...new Set(
 rowsData
 .filter(r=>r[2]?.trim()===selectedCat)
 .map(r=>r[3]?.trim())
 )];

 const sub =
 document.getElementById("sub");

 sub.innerHTML="";

 subs.forEach(s=>{
   sub.innerHTML +=
   `<option>${s}</option>`;
 });

}

document
.getElementById("cat")
.addEventListener(
 "change",
 loadSubCategories
);

loadData();

</script>

</body>
</html>
