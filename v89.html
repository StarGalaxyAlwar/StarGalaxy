<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Star Galaxy V89</title>
<style>
body{
font-family:Arial,sans-serif;
background:#eef2f7;
margin:0;
padding:0;
}

.header{
background:#003366;
color:white;
text-align:center;
padding:25px;
}

.header h1{
margin:0;
font-size:42px;
}

.header p{
margin-top:10px;
font-size:18px;
}

.container{
max-width:1200px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

label{
font-weight:bold;
display:block;
margin-top:15px;
margin-bottom:5px;
}

select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

input[type=number]{
width:70px;
padding:8px;
text-align:center;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#003366;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #ddd;
}

tr:nth-child(even){
background:#f8f8f8;
}

#grand{
background:#28a745;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
margin-top:25px;
font-size:34px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.btn{
background:#28a745;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

.btn:hover{
background:#218838;
}
input[type=text],
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
box-sizing:border-box;
}

textarea{
height:80px;
resize:vertical;
}
</style>
</head>
<body>
<div class="header">
<h1>STAR HAVELLS GALAXY</h1>
<p>Product Rate Reference Portal</p>
</div>

<div class="container">

<label>Category</label><br>
<select id="cat"></select>

<br>

<label>Sub Category</label><br>
<select id="sub"></select>

<h3>Products</h3>

<div id="products"></div>
 <h3>Customer Details</h3>

<label>Customer Name</label>
<input type="text" id="custName">

<label>Mobile Number</label>
<input type="text" id="custMobile">

<label>Address</label>
<textarea id="custAddress"></textarea>

<button class="btn">
Generate Quote PDF
</button>
<h2 id="grand">Grand Total : ₹0</h2>
<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRxd_G-sJAfhK7PUWSi_g6_JHdsWqOI4ZZsULpRmRtsFUUSmXiaCswhcPi5zoohvGwN-54gIRxRs_8C/pub?gid=354666361&single=true&output=csv";

let rowsData=[];

async function loadData(){

 const txt = await fetch(CSV_URL).then(r=>r.text());

 rowsData = txt
 .trim()
 .split("\n")
 .slice(1)
 .map(r=>r.split(","));

 const categories = [...new Set(
 rowsData.map(r=>r[2]?.trim())
 )];

 const cat =
 document.getElementById("cat");

 cat.innerHTML="";

 categories.forEach(c=>{
   cat.innerHTML +=
   `<option value="${c}">${c}</option>`;
 });

 loadSubCategories();

}

function loadSubCategories(){

 const selectedCat =
 document.getElementById("cat").value;

 const subs = [...new Set(
 rowsData
 .filter(r=>r[2]?.trim()===selectedCat)
 .map(r=>r[3]?.trim())
 )];

 const sub =
 document.getElementById("sub");

 sub.innerHTML="";

 subs.forEach(s=>{
   sub.innerHTML +=
   `<option value="${s}">${s}</option>`;
 });

 loadProducts();

}

function loadProducts(){

 const selectedCat =
 document.getElementById("cat").value;

 const selectedSub =
 document.getElementById("sub").value;

 const rows =
 rowsData.filter(r =>
 r[2]?.trim()===selectedCat &&
 r[3]?.trim()===selectedSub
 );

 let html =
 "<table>" +
 "<tr><th>Product</th><th>Rate</th><th>Qty</th><th>Amount</th></tr>";

 rows.forEach(r=>{

  html +=
"<tr>" +
"<td>"+(r[4]||"")+"</td>" +
"<td>₹"+(r[6]||"0")+"</td>" +
"<td><input type='number' min='0' value='0' data-rate='"+(r[6]||0)+"' onchange='calc(this)'></td>" +
"<td class='amt'>₹0</td>" +
"</tr>";
 });

 html += "</table>";

 document.getElementById("products").innerHTML =
 html;

}

document
.getElementById("cat")
.addEventListener(
 "change",
 loadSubCategories
);

document
.getElementById("sub")
.addEventListener(
 "change",
 loadProducts
);

loadData();
function calc(el){

 const rate =
 Number(el.getAttribute("data-rate")) || 0;

 const qty =
 Number(el.value) || 0;

 const amt =
 rate * qty;

 const row =
 el.closest("tr");

 row.querySelector(".amt").innerHTML =
 "₹"+amt;

 updateGrandTotal();

}
function updateGrandTotal(){

 let total = 0;

 document
 .querySelectorAll(".amt")
 .forEach(x=>{

   total += Number(
   x.innerText.replace("₹","")
   ) || 0;

 });

 let grand =
 document.getElementById("grand");

 

 grand.innerHTML =
 "Grand Total : ₹"+total;

}
</script>
<button class="btn">
Create Quote
</button>

</div>
</body>
</html>
