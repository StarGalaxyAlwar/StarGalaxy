<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Star Galaxy V89</title>
<style>
body{font-family:Arial;padding:20px}
select{padding:8px;margin:8px 0;width:300px}
table{border-collapse:collapse;width:100%;margin-top:15px}
th,td{border:1px solid #ddd;padding:8px}
th{background:#f2f2f2}
</style>
</head>
<body>

<h2>Star Galaxy V89</h2>

<label>Category</label><br>
<select id="cat"></select>

<br>

<label>Sub Category</label><br>
<select id="sub"></select>

<h3>Products</h3>

<div id="products"></div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRxd_G-sJAfhK7PUWSi_g6_JHdsWqOI4ZZsULpRmRtsFUUSmXiaCswhcPi5zoohvGwN-54gIRxRs_8C/pub?gid=354666361&single=true&output=csv";

let rowsData=[];

async function loadData(){

 const txt = await fetch(CSV_URL).then(r=>r.text());

 rowsData = txt
 .trim()
 .split("\n")
 .slice(1)
 .map(r=>r.split(","));

 const categories = [...new Set(
 rowsData.map(r=>r[2]?.trim())
 )];

 const cat =
 document.getElementById("cat");

 cat.innerHTML="";

 categories.forEach(c=>{
   cat.innerHTML +=
   `<option value="${c}">${c}</option>`;
 });

 loadSubCategories();

}

function loadSubCategories(){

 const selectedCat =
 document.getElementById("cat").value;

 const subs = [...new Set(
 rowsData
 .filter(r=>r[2]?.trim()===selectedCat)
 .map(r=>r[3]?.trim())
 )];

 const sub =
 document.getElementById("sub");

 sub.innerHTML="";

 subs.forEach(s=>{
   sub.innerHTML +=
   `<option value="${s}">${s}</option>`;
 });

 loadProducts();

}

function loadProducts(){

 const selectedCat =
 document.getElementById("cat").value;

 const selectedSub =
 document.getElementById("sub").value;

 const rows =
 rowsData.filter(r =>
 r[2]?.trim()===selectedCat &&
 r[3]?.trim()===selectedSub
 );

 let html =
 "<table>" +
 "<tr><th>Product</th><th>Rate</th><th>Qty</th><th>Amount</th></tr>";

 rows.forEach(r=>{

  html +=
"<tr>" +
"<td>"+(r[4]||"")+"</td>" +
"<td>₹"+(r[6]||"0")+"</td>" +
"<td><input type='number' min='0' value='0' onchange='calc(this,"+r[6]+")'></td>" +
"<td class='amt'>₹0</td>" +
"</tr>";
 });

 html += "</table>";

 document.getElementById("products").innerHTML =
 html;

}

document
.getElementById("cat")
.addEventListener(
 "change",
 loadSubCategories
);

document
.getElementById("sub")
.addEventListener(
 "change",
 loadProducts
);

loadData();
function calc(el,rate){

 const row = el.parentNode.parentNode;

 const qty = Number(el.value)||0;

 const amt = qty * rate;

 row.querySelector(".amt").innerHTML =
 "₹"+amt;

 updateGrandTotal();

}

function updateGrandTotal(){

 let total = 0;

 document
 .querySelectorAll(".amt")
 .forEach(x=>{

   total += Number(
   x.innerText.replace("₹","")
   ) || 0;

 });

 let grand =
 document.getElementById("grand");

 if(!grand){

   grand=document.createElement("h2");

   grand.id="grand";

   document.body.appendChild(grand);

 }

 grand.innerHTML =
 "Grand Total : ₹"+total;

}
</script>

</body>
</html>
